version: "3.8"

services:
  caddy:
    build: .                        # uses the Dockerfile in this repo
    # OR use a pre-built image:
    # image: ghcr.io/ndowens/caddy-proxmox-provider:latest
    container_name: caddy-proxmox
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"               # HTTP/3
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PROXMOX_API_TOKEN: "your-token-secret-here"
    networks:
      - proxy

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy:
    driver: bridge
